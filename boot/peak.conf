# Peak bootloader defaults (BIOS VBE / UEFI GOP preference)
resolution=1920x1080
bpp=32

# Network: dhcp_fallback | static | dhcp_only
# Fallback/static values match QEMU user-net; bridged LAN uses DHCP.
net_mode=dhcp_fallback
# verify_required=1          # fail closed unless kernel_sha256= or SHA256SUMS matches
# kernel_sha256=<64 hex>     # optional dev override (see scripts/mkmanifest.py)
net_ip=10.0.2.15
net_mask=255.255.255.0
net_gw=10.0.2.2
net_dns=10.0.2.3
dhcp_timeout_ticks=300
