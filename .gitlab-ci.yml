# Peak OS CI — x86 ISO + aarch64 Pi image on every push/MR
# Requires: clang, lld, xorriso, make, python3, qemu-system-aarch64

stages:
  - build
  - test

build-iso:
  stage: build
  image: debian:bookworm-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq clang lld llvm xorriso make python3 ca-certificates
      qemu-system-x86 ripgrep
  script:
    - export PATH="$(dirname $(command -v clang)):$PATH"
    - make ARCH=x86_64 doctor
    - make iso
    - test -f build/peak-os.iso
    - test -f build/x86_64/boot/peak-bios.bin
    - test -f build/x86_64/boot/BOOTX64.EFI || test -f build/x86_64/boot/BOOTX64.efi
    - test -f build/x86_64/kernel.elf
    - ls -la build/peak-os.iso build/x86_64/kernel.elf
  artifacts:
    paths:
      - build/peak-os.iso
      - build/x86_64/kernel.elf
      - build/x86_64/boot/peak-bios.bin
      - build/x86_64/boot/BOOTX64.EFI
    expire_in: 1 week

build-rpi:
  stage: build
  image: debian:bookworm-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq clang lld llvm make python3 ca-certificates curl
      qemu-system-arm ripgrep
  script:
    - export PATH="$(dirname $(command -v clang)):$PATH"
    - make ARCH=aarch64 PLATFORM=rpi doctor
    - make ARCH=aarch64 PLATFORM=rpi pi-image
    - make ARCH=aarch64 PLATFORM=rpi pi-image-check
    - test -f build/peak-os-rpi-arm64.img
    - test -f build/aarch64/kernel8.img
    - chmod +x scripts/check-kernel-size.sh
    - ./scripts/check-kernel-size.sh build/aarch64/kernel.elf
  artifacts:
    paths:
      - build/peak-os-rpi-arm64.img
      - build/aarch64/kernel8.img
      - build/SHA256SUMS
    expire_in: 1 week
    when: on_success

host-tests:
  stage: test
  image: debian:bookworm-slim
  needs:
    - build-iso
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq clang make python3 llvm xorriso ripgrep
  script:
    - make test-host
    - chmod +x scripts/purity-check.sh
    - ./scripts/purity-check.sh
    - test -f docs/security-model.md
    - test -f docs/privacy.md
    - test -f docs/csprng.md
    - test -f docs/verified-boot.md
    - chmod +x scripts/fuzz-elf-smoke.sh
    - ./scripts/fuzz-elf-smoke.sh
    - test -f build/x86_64/kernel.elf
    - llvm-readelf -lW build/x86_64/kernel.elf | tee /tmp/phdrs.txt
    - if grep ' RWE ' /tmp/phdrs.txt; then echo "RWX PHDR forbidden"; exit 1; fi
    - chmod +x scripts/check-kernel-size.sh
    - ./scripts/check-kernel-size.sh build/x86_64/kernel.elf
    - python3 scripts/mkmanifest.py
    - test -f build/SHA256SUMS
    - chmod +x scripts/smoke-cli.sh
    - PEAK_SKIP_ISO=1 PEAK_SKIP_HOST_TESTS=1 ./scripts/smoke-cli.sh

smoke-bios:
  stage: test
  image: debian:bookworm-slim
  needs:
    - build-iso
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq qemu-system-x86 make
  script:
    - chmod +x scripts/smoke-qemu.sh
    - PEAK_FIRMWARE=bios TIMEOUT_SEC=90 ./scripts/smoke-qemu.sh

smoke-uefi:
  stage: test
  image: debian:bookworm-slim
  needs:
    - build-iso
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq qemu-system-x86 ovmf make
  script:
    - chmod +x scripts/smoke-qemu.sh
    - OVMF_CODE=/usr/share/OVMF/OVMF_CODE.fd
      PEAK_FIRMWARE=uefi TIMEOUT_SEC=90 ./scripts/smoke-qemu.sh

smoke-peakfs:
  stage: test
  image: debian:bookworm-slim
  needs:
    - build-iso
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq qemu-system-x86 clang lld llvm xorriso make
  script:
    - export PATH="$(dirname $(command -v clang)):$PATH"
    - chmod +x scripts/smoke-peakfs.sh
    - TIMEOUT_SEC=90 ./scripts/smoke-peakfs.sh

smoke-aarch64:
  stage: test
  image: debian:bookworm-slim
  needs:
    - build-rpi
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq qemu-system-arm
  script:
    - chmod +x scripts/smoke-aarch64.sh
    - ./scripts/smoke-aarch64.sh
