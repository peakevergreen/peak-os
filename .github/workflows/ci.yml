# Peak OS CI — x86 ISO + aarch64 Pi image on every push/PR
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-iso:
    name: Build x86 ISO
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang lld llvm xorriso make python3 \
            ca-certificates qemu-system-x86 ripgrep
      - name: Doctor + ISO
        run: |
          export PATH="/usr/lib/llvm-*/bin:$PATH"
          make ARCH=x86_64 doctor || make doctor
          make iso
          test -f build/peak-os.iso
          test -f build/x86_64/boot/peak-bios.bin || test -f build/boot/peak-bios.bin
          test -f build/x86_64/kernel.elf
          ls -la build/peak-os.iso build/x86_64/kernel.elf
      - uses: actions/upload-artifact@v4
        with:
          name: peak-os-iso
          path: |
            build/peak-os.iso
            build/x86_64/kernel.elf
          retention-days: 7

  build-rpi:
    name: Build Raspberry Pi image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang lld llvm make python3 \
            ca-certificates curl qemu-system-arm ripgrep
      - name: Doctor + pi-image
        run: |
          export PATH="/usr/lib/llvm-*/bin:$PATH"
          make ARCH=aarch64 PLATFORM=rpi doctor
          make ARCH=aarch64 PLATFORM=rpi pi-image
          make ARCH=aarch64 PLATFORM=rpi pi-image-check
          test -f build/peak-os-rpi-arm64.img
          test -f build/aarch64/kernel8.img
          chmod +x scripts/check-kernel-size.sh
          ./scripts/check-kernel-size.sh build/aarch64/kernel.elf
      - uses: actions/upload-artifact@v4
        with:
          name: peak-os-rpi-img
          path: |
            build/peak-os-rpi-arm64.img
            build/aarch64/kernel8.img
            build/SHA256SUMS
          retention-days: 7

  host-tests:
    name: Host tests + purity
    runs-on: ubuntu-22.04
    needs: [build-iso]
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang make python3 llvm xorriso ripgrep
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: peak-os-iso
          path: build/
      - name: Tests
        run: |
          export PATH="/usr/lib/llvm-*/bin:$PATH"
          # Restore nested layout if artifact flattened
          mkdir -p build/x86_64
          if [ -f build/kernel.elf ] && [ ! -f build/x86_64/kernel.elf ]; then
            mv build/kernel.elf build/x86_64/kernel.elf
          fi
          make test-host
          chmod +x scripts/purity-check.sh
          ./scripts/purity-check.sh
          test -f docs/security-model.md
          chmod +x scripts/fuzz-elf-smoke.sh
          ./scripts/fuzz-elf-smoke.sh || true
          if [ -f build/x86_64/kernel.elf ]; then
            llvm-readelf -lW build/x86_64/kernel.elf | tee /tmp/phdrs.txt
            if grep ' RWE ' /tmp/phdrs.txt; then echo "RWX PHDR forbidden"; exit 1; fi
            chmod +x scripts/check-kernel-size.sh
            ./scripts/check-kernel-size.sh build/x86_64/kernel.elf
          fi

  smoke-bios:
    name: QEMU BIOS smoke
    runs-on: ubuntu-22.04
    needs: [build-iso]
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 make
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: peak-os-iso
          path: build/
      - name: Smoke
        run: |
          chmod +x scripts/smoke-qemu.sh
          PEAK_FIRMWARE=bios TIMEOUT_SEC=90 ./scripts/smoke-qemu.sh

  smoke-aarch64:
    name: QEMU aarch64 smoke
    runs-on: ubuntu-22.04
    needs: [build-rpi]
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-arm
      - name: Download Pi artifacts
        uses: actions/download-artifact@v4
        with:
          name: peak-os-rpi-img
          path: build/
      - name: Smoke
        run: |
          mkdir -p build/aarch64
          if [ -f build/kernel8.img ] && [ ! -f build/aarch64/kernel8.img ]; then
            mv build/kernel8.img build/aarch64/kernel8.img
          fi
          chmod +x scripts/smoke-aarch64.sh
          ./scripts/smoke-aarch64.sh
