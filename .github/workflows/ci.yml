# Peak OS CI — x86 ISO + aarch64 Pi image on every push/PR
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-iso:
    name: Build x86 ISO
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ~/apt-archives
          key: apt-iso-${{ hashFiles('scripts/ci-install-deps.sh') }}
      - name: Install toolchain
        run: |
          sudo mkdir -p /var/cache/apt/archives
          if [ -d "$HOME/apt-archives" ] && [ "$(ls -A "$HOME/apt-archives" 2>/dev/null)" ]; then
            sudo cp -a "$HOME/apt-archives/." /var/cache/apt/archives/ || true
          fi
          chmod +x scripts/ci-install-deps.sh
          ./scripts/ci-install-deps.sh iso
          mkdir -p "$HOME/apt-archives"
          sudo cp -a /var/cache/apt/archives/*.deb "$HOME/apt-archives/" 2>/dev/null || true
      - name: Doctor + ISO
        run: |
          export PATH="/usr/lib/llvm-*/bin:$PATH"
          make ARCH=x86_64 doctor
          make iso
          test -f build/peak-os.iso
          test -f build/x86_64/boot/peak-bios.bin || test -f build/boot/peak-bios.bin
          test -f build/x86_64/boot/BOOTX64.EFI || test -f build/x86_64/boot/BOOTX64.efi
          test -f build/x86_64/kernel.elf
          ls -la build/peak-os.iso build/x86_64/kernel.elf
      - uses: actions/upload-artifact@v4
        with:
          name: peak-os-iso
          path: |
            build/peak-os.iso
            build/x86_64/
          retention-days: 7

  build-rpi:
    name: Build Raspberry Pi image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ~/apt-archives
          key: apt-rpi-${{ hashFiles('scripts/ci-install-deps.sh') }}
      - name: Install toolchain
        run: |
          sudo mkdir -p /var/cache/apt/archives
          if [ -d "$HOME/apt-archives" ] && [ "$(ls -A "$HOME/apt-archives" 2>/dev/null)" ]; then
            sudo cp -a "$HOME/apt-archives/." /var/cache/apt/archives/ || true
          fi
          chmod +x scripts/ci-install-deps.sh
          ./scripts/ci-install-deps.sh rpi
          mkdir -p "$HOME/apt-archives"
          sudo cp -a /var/cache/apt/archives/*.deb "$HOME/apt-archives/" 2>/dev/null || true
      - name: Doctor + pi-image
        run: |
          export PATH="/usr/lib/llvm-*/bin:$PATH"
          make ARCH=aarch64 PLATFORM=rpi doctor
          make ARCH=aarch64 PLATFORM=rpi pi-image
          make ARCH=aarch64 PLATFORM=rpi pi-image-check
          test -f build/peak-os-rpi-arm64.img
          test -f build/aarch64/kernel8.img
          chmod +x scripts/check-kernel-size.sh
          ./scripts/check-kernel-size.sh build/aarch64/kernel.elf
      - uses: actions/upload-artifact@v4
        with:
          name: peak-os-rpi-img
          path: |
            build/peak-os-rpi-arm64.img
            build/aarch64/
            build/SHA256SUMS
          retention-days: 7

  host-tests:
    name: Host tests + purity
    runs-on: ubuntu-22.04
    needs: [build-iso]
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ~/apt-archives
          key: apt-host-${{ hashFiles('scripts/ci-install-deps.sh') }}
      - name: Install tools
        run: |
          sudo mkdir -p /var/cache/apt/archives
          if [ -d "$HOME/apt-archives" ] && [ "$(ls -A "$HOME/apt-archives" 2>/dev/null)" ]; then
            sudo cp -a "$HOME/apt-archives/." /var/cache/apt/archives/ || true
          fi
          chmod +x scripts/ci-install-deps.sh
          ./scripts/ci-install-deps.sh host
          mkdir -p "$HOME/apt-archives"
          sudo cp -a /var/cache/apt/archives/*.deb "$HOME/apt-archives/" 2>/dev/null || true
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: peak-os-iso
          path: build/
      - name: Tests
        run: |
          export PATH="/usr/lib/llvm-*/bin:$PATH"
          test -f build/x86_64/kernel.elf
          make test-host
          chmod +x scripts/purity-check.sh
          ./scripts/purity-check.sh
          test -f docs/security-model.md
          test -f docs/privacy.md
          test -f docs/csprng.md
          test -f docs/verified-boot.md
          chmod +x scripts/fuzz-elf-smoke.sh
          ./scripts/fuzz-elf-smoke.sh
          llvm-readelf -lW build/x86_64/kernel.elf | tee /tmp/phdrs.txt
          if grep ' RWE ' /tmp/phdrs.txt; then echo "RWX PHDR forbidden"; exit 1; fi
          chmod +x scripts/check-kernel-size.sh
          ./scripts/check-kernel-size.sh build/x86_64/kernel.elf
          python3 scripts/mkmanifest.py
          test -f build/SHA256SUMS
          chmod +x scripts/smoke-cli.sh
          PEAK_SKIP_ISO=1 PEAK_SKIP_HOST_TESTS=1 ./scripts/smoke-cli.sh

  smoke-qemu:
    name: QEMU BIOS + UEFI smoke
    runs-on: ubuntu-22.04
    needs: [build-iso]
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ~/apt-archives
          key: apt-smoke-qemu-${{ hashFiles('scripts/ci-install-deps.sh') }}
      - name: Install QEMU + OVMF
        run: |
          sudo mkdir -p /var/cache/apt/archives
          if [ -d "$HOME/apt-archives" ] && [ "$(ls -A "$HOME/apt-archives" 2>/dev/null)" ]; then
            sudo cp -a "$HOME/apt-archives/." /var/cache/apt/archives/ || true
          fi
          chmod +x scripts/ci-install-deps.sh
          ./scripts/ci-install-deps.sh smoke-qemu
          mkdir -p "$HOME/apt-archives"
          sudo cp -a /var/cache/apt/archives/*.deb "$HOME/apt-archives/" 2>/dev/null || true
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: peak-os-iso
          path: build/
      - name: Smoke BIOS + UEFI
        run: |
          chmod +x scripts/smoke-qemu.sh scripts/smoke-common.sh
          OVMF_CODE=/usr/share/OVMF/OVMF_CODE.fd \
            PEAK_FIRMWARE=both TIMEOUT_SEC=90 ./scripts/smoke-qemu.sh

  smoke-peakfs:
    name: QEMU PeakFS roundtrip
    runs-on: ubuntu-22.04
    needs: [build-iso]
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ~/apt-archives
          key: apt-smoke-peakfs-${{ hashFiles('scripts/ci-install-deps.sh') }}
      - name: Install tools
        run: |
          sudo mkdir -p /var/cache/apt/archives
          if [ -d "$HOME/apt-archives" ] && [ "$(ls -A "$HOME/apt-archives" 2>/dev/null)" ]; then
            sudo cp -a "$HOME/apt-archives/." /var/cache/apt/archives/ || true
          fi
          chmod +x scripts/ci-install-deps.sh
          ./scripts/ci-install-deps.sh smoke-peakfs
          mkdir -p "$HOME/apt-archives"
          sudo cp -a /var/cache/apt/archives/*.deb "$HOME/apt-archives/" 2>/dev/null || true
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: peak-os-iso
          path: build/
      - name: PeakFS smoke
        run: |
          export PATH="/usr/lib/llvm-*/bin:$PATH"
          test -f build/x86_64/kernel.elf
          chmod +x scripts/smoke-peakfs.sh
          TIMEOUT_SEC=120 ./scripts/smoke-peakfs.sh

  smoke-aarch64:
    name: QEMU aarch64 smoke
    runs-on: ubuntu-22.04
    needs: [build-rpi]
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ~/apt-archives
          key: apt-smoke-aarch64-${{ hashFiles('scripts/ci-install-deps.sh') }}
      - name: Install QEMU
        run: |
          sudo mkdir -p /var/cache/apt/archives
          if [ -d "$HOME/apt-archives" ] && [ "$(ls -A "$HOME/apt-archives" 2>/dev/null)" ]; then
            sudo cp -a "$HOME/apt-archives/." /var/cache/apt/archives/ || true
          fi
          chmod +x scripts/ci-install-deps.sh
          ./scripts/ci-install-deps.sh smoke-aarch64
          mkdir -p "$HOME/apt-archives"
          sudo cp -a /var/cache/apt/archives/*.deb "$HOME/apt-archives/" 2>/dev/null || true
      - name: Download Pi artifacts
        uses: actions/download-artifact@v4
        with:
          name: peak-os-rpi-img
          path: build/
      - name: Smoke
        run: |
          test -f build/aarch64/kernel8.img
          chmod +x scripts/smoke-aarch64.sh
          ./scripts/smoke-aarch64.sh
